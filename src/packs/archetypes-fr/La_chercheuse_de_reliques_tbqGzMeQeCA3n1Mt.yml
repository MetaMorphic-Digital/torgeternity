  details:
    background: "<h2>Présentation</h2>\n<p class=\"MsoNormal\">Avant les Guerres des Possibilités, vous vous intéressiez à<span style=\"mso-spacerun:yes\">\_\_ </span>l’archéologie mais ce n’était pas votre carrière. Alors que le<span style=\"mso-spacerun:yes\">\_\_ </span>monde était en train de changer, les tombes, les cryptes et<span style=\"mso-spacerun:yes\">\_\_ </span>les temples sur toute la planète sont devenus des sources<span style=\"mso-spacerun:yes\">\_\_ </span>de danger et de pouvoir. Vous avez également changé et<span style=\"mso-spacerun:yes\">\_\_ </span>désormais vous êtes suffisamment rapide, rusée et brave<span style=\"mso-spacerun:yes\">\_\_ </span>pour aller trouver des reliques dans ces sites.<span style=\"mso-spacerun:yes\">\_\_ </span>La récompense en vaut largement le risque. Certains<span style=\"mso-spacerun:yes\">\_\_ </span>endroits sombres renferment des informations sur les<span style=\"mso-spacerun:yes\">\_\_ </span>Pillards de Réalités ou sur les monstres qui les servent.<span style=\"mso-spacerun:yes\">\_\_ </span>D’autres contiennent des trésors et ceux qui ont le plus de<span style=\"mso-spacerun:yes\">\_\_ </span>valeur sont des artefacts appelés les Fragments d’Éternité,<span style=\"mso-spacerun:yes\">\_\_ </span>que recherchent désespérément aussi bien le Conseil de<span style=\"mso-spacerun:yes\">\_\_ </span>Delphes que les Seigneurs de Réalité.<span style=\"mso-spacerun:yes\">\_</span></p>\n<h2 class=\"MsoNormal\"><span class=\"Titre2Car\"><span style=\"font-size:14.0pt;line-height:107%\">Tactiques</span></span></h2>\n<p class=\"MsoNormal\">Votre haute Dextérité et votre rang en Esquive vous<span style=\"mso-spacerun:yes\">\_\_ </span>permettent de prendre de grands risques et, généralement,<span style=\"mso-spacerun:yes\">\_\_ </span>de vous en tirer sans une égratignure. Vous n’êtes pas aussi<span style=\"mso-spacerun:yes\">\_\_ </span>douée en défense en mêlée, aussi gardez vos distances<span style=\"mso-spacerun:yes\">\_\_ </span>quand cela est possible. Votre machette est une arme de<span style=\"mso-spacerun:yes\">\_\_ </span>dernier recours mais elle est assez pratique utilisée avec<span style=\"mso-spacerun:yes\">\_\_ </span>votre pistolet pour bénéficier de votre défense en Armes de<span style=\"mso-spacerun:yes\">\_\_ </span>mêlée contre des ennemis proches. Votre autre option est de<span style=\"mso-spacerun:yes\">\_\_ </span>faire feu avec deux pistolets à la fois, ce qui vous confère un<span style=\"mso-spacerun:yes\">\_\_ </span>bonus de +2 pour toucher !<span style=\"mso-spacerun:yes\">\_\_ </span>Utilisez Manoeuvre pour piéger vos adversaires surtout s’il<span style=\"mso-spacerun:yes\">\_\_ </span>s’agit d’une Action approuvée.<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<h2>Instant fatidique</h2>\n<p class=\"MsoNormal\">Quand la Nuit des Hurlements s’est abattue, vous avez<span style=\"mso-spacerun:yes\">\_\_ </span>apporté votre aide au cours de la première vague de<span style=\"mso-spacerun:yes\">\_\_ </span>dévastation. Quand les monstres sont arrivés, tous les<span style=\"mso-spacerun:yes\">\_\_ </span>autres sont morts. Votre Instant fatidique a pu se produire<span style=\"mso-spacerun:yes\">\_\_ </span>au moment où vous avez combattu ces créatures et que<span style=\"mso-spacerun:yes\">\_\_ </span>vous en avez vaincu une en l’attirant dans un piège. Ou il<span style=\"mso-spacerun:yes\">\_\_ </span>a pu se produire quand vous avez transporté une victime<span style=\"mso-spacerun:yes\">\_\_ </span>blessée à l’abri.<span style=\"mso-spacerun:yes\">\_ </span></p>\n<h2><span style=\"mso-spacerun:yes\">\_</span>Citation</h2>\n<p class=\"MsoNormal\">« Sa place est dans un musée ! Enfin, peut-être pas, mais il est hors de question que vous l’ayez ! »</p>\n<h2>Description</h2>\n<p class=\"MsoNormal\">Vous êtes à la mode et vous préférez les couleurs vives<span style=\"mso-spacerun:yes\">\_\_ </span>et un mélange éclectique d’efficacité moderne et de<span style=\"mso-spacerun:yes\">\_\_ </span>style traditionnel. Vous êtes téméraire, sincère et calme.<span style=\"mso-spacerun:yes\">\_\_ </span>Secrètement, vous adorez agacer les Victoriens.</p>\n<h2>Objectif</h2>\n<p class=\"MsoNormal\">Les Fragments d’Éternité sont des artefacts importants.<span style=\"mso-spacerun:yes\">\_\_ </span>Pas uniquement d’un point de vue culturel mais pour les<span style=\"mso-spacerun:yes\">\_\_ </span>indices qu’ils renferment sur la manière dont fonctionne la<span style=\"mso-spacerun:yes\">\_\_ </span>réalité et le pouvoir dont ils sont dotés. Quoi qu’ils puissent<span style=\"mso-spacerun:yes\">\_\_ </span>être, vous devez les trouver et éviter qu’ils ne tombent<span style=\"mso-spacerun:yes\">\_\_ </span>entre les mains des Seigneurs de Réalité.</p>\n<h2>Noms</h2>\n<p class=\"MsoNormal\">Anishaa, Bhaanu, Dara, Ganjan, Kantha, Maalya, Navya, Padma, Rahel</p>\n<h2>Piste de progression (optionnelle)</h2>\n<p class=\"MsoNormal\">□ (5 PX) Conscience environnementale</p>\n<p class=\"MsoNormal\">□ (7 PX) Endurance</p>\n<p class=\"MsoNormal\">□ (1 PX) Foi +1</p>\n<p class=\"MsoNormal\">□ (2 PX) Sciences humaines +2</p>\n<p class=\"MsoNormal\">□ (3 PX) Armes à feu +3</p>\n<p class=\"MsoNormal\">□ (3 PX) Réalité +3</p>\n<p class=\"MsoNormal\">□ (4 PX) Esquive +4</p>\n<p class=\"MsoNormal\">□ (5 PX) Esquive +5</p>"
    race: human
    sizeBonus: normal
  editstate: false
