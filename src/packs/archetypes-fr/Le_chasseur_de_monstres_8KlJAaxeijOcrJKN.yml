  details:
    background: "<h2>Présentation</h2>\n<p class=\"MsoNormal\"><span style=\"mso-spacerun:yes\">\_</span>Vous êtes un Victorien et votre monde, Gaéa, est ravagé par les horreurs du Décharné. Vous avez refusé d’être soumis à la terreur alors vous avez riposté. Contre toute attente, vous avez survécu et les différents gadgets, les astuces et les armes spéciales que vous avez acquis au fil des années de combat vous ont permis de rétablir l’équilibre.</p>\n<p class=\"MsoNormal\">Quand le Décharné a rassemblé ses sombres hordes pour franchir les ponts maelström afin de déchaîner sa fureur sur la Prime Terre, vous avez décidé de les suivre pour les harceler comme vous l’avez toujours fait.</p>\n<h2>Tactiques</h2>\n<p class=\"MsoNormal\">Les cartouches spéciales de votre fusil tueur vous confèrent une grande puissance de feu et une grande souplesse contre des ennemis précis, même en dehors d’Orrorsh. À chaque fois que vous le pouvez, renseignez-vous pour savoir quels types d’adversaires vous risquez de rencontrer et préparez votre équipement en conséquence. Les Cartouches d’eau bénite sont efficaces contre les gospogs, un ennemi commun employé par tous les Seigneurs de Réalité. Même une fois toutes vos cartouches spécialisées utilisées, vos munitions standards demeurent assez puissantes. Vous êtes très résistant à la peur et à l’Intimidation mais très vulnérable aux interactions offensives de Provocation. Les Victoriens sont notoirement hautains et ne supportent pas les insultes.</p>\n<h2><span style=\"mso-spacerun:yes\">\_</span>Instant fatidique</h2>\n<p class=\"MsoNormal\">Votre Instant fatidique s’est produit il y a très longtemps sur Gaéa. Peut-être à cause d’un loup-garou ou d’un vampire. Quoi qu’il en soit, c’était une abomination engendrée par la malfaisance du Décharné. La traquer jusqu’à sa tanière était téméraire mais cela a déclenché un changement en vous. En tant que Chevalier des Tempêtes vous avez désormais le pouvoir de répliquer.</p>\n<h2>Citation</h2>\n<p class=\"MsoNormal\">« Il est plus facile de ne plus avoir peur d’une chose une fois que vous avez le pouvoir de la détruire. »</p>\n<h2><span style=\"mso-spacerun:yes\">\_</span>Description</h2>\n<p class=\"MsoNormal\">*Combattre des monstres est une profession dangereuse et vos différentes cicatrices sont là pour en témoigner. Seules certaines de ces cicatrices sont visibles. Les Victoriens préfèrent les tenues modestes couvrant tout leur corps même quand il fait extrêmement chaud et vous ne faites pas exception à la règle. Votre manteau si particulier, constitué d’un cuir étrange, et votre fusil tueur démesuré et décoré trahissent votre profession.</p>\n<h2>Objectif</h2>\n<p class=\"MsoNormal\"><span style=\"mso-spacerun:yes\">\_ </span>La destruction du mal est un impératif. Si on les laisse<span style=\"mso-spacerun:yes\">\_\_ </span>prospérer, les monstres deviennent encore plus puissants<span style=\"mso-spacerun:yes\">\_\_ </span>et vils. Les Seigneurs de Réalité, malgré toutes leurs ruses<span style=\"mso-spacerun:yes\">\_\_ </span>et leurs faux semblants, ne sont que des monstres que vous<span style=\"mso-spacerun:yes\">\_\_ </span>devez traquer et exterminer.</p>\n<h2><span style=\"mso-spacerun:yes\">\_ </span>Noms</h2>\n<p class=\"MsoNormal\"><span style=\"mso-spacerun:yes\">\_ </span>Ashton, Aubrey, Eli, Harper, Marion, Prester, Tanner,<span style=\"mso-spacerun:yes\">\_\_ </span>Thomas, Winter<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<h2>Piste de progression (optionnelle)<span style=\"mso-spacerun:yes\">\_ </span></h2>\n<p class=\"MsoNormal\"><span style=\"mso-spacerun:yes\">\_</span>□ (5 PX) Tireur d’élite<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<p class=\"MsoNormal\">□ (7 PX) Armurier (Cartouches explosives)<span style=\"mso-spacerun:yes\">\_\_</span></p>\n<p class=\"MsoNormal\"><span style=\"mso-spacerun:yes\"> </span>□ (1 PX) Ruse +1<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<p class=\"MsoNormal\">□ (2 PX) Manoeuvre +2<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<p class=\"MsoNormal\">□ (3 PX) Intimidation +3<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<p class=\"MsoNormal\">□ (3 PX) Armes de mêlée +3<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<p class=\"MsoNormal\">□ (4 PX) Armes à feu +4<span style=\"mso-spacerun:yes\">\_\_ </span></p>\n<p class=\"MsoNormal\">□ (5 PX) Armes à feu +5<span style=\"mso-spacerun:yes\">\_\_ </span></p>"
