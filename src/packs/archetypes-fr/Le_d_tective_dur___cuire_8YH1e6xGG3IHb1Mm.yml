  details:
    background: >-
      <h2>Présentation</h2>

      <p class="MsoNormal">Des années passées dans les rues de Hong Kong vous
      ont endurci et vous êtes devenu une arme fatale. Devenir un Chevalier des
      Tempêtes n’a fait qu’accroître vos capacités. Mais en tout premier lieu,
      vous êtes un enquêteur. Vous avez été entraîné pour suivre des pistes,
      interroger des témoins et faire régner la loi et l’ordre. Quand les
      criminels résistent à leur arrestation, ce qu’ils font toujours, les
      choses dégénèrent rapidement et vous avez alors recours à vos autres
      compétences.</p>

      <h2>Tactiques</h2>

      <p class="MsoNormal">Vous êtes un tireur élite et vous avez la puissance
      de feu d’une petite armée quand vous utilisez vos deux pistolets 9 mm. Vos
      compétences élevées en Esquive et en Combat à mains nues vous permettent
      de vous défendre contre des adversaires proches ou éloignés. Manoeuvre est
      votre principale interaction offensive, essayez d’y avoir recours à chaque
      fois que c’est une Action approuvée. L’Atout Parade offensive vous permet
      de riposter contre un attaquant qui vous rate en mêlée, tant que vous avez
      des points de Choc à dépenser. Vous pouvez avoir recours à une attaque en
      mêlée même quand vous êtes équipé de vos deux pistolets ; vous utilisez
      vos pieds ou vos épaules.</p>

      <h2>Instant fatidique</h2>

      <p class="MsoNormal">Quelque chose d’important se préparait et une
      corporation appelée « Kanawa » était au centre de cette affaire. Vos
      supérieurs vous ont menacé de vous suspendre et de laisser tomber.
      Quelqu’un a même essayé de vous tuer. Vous n’avez pas laissé tomber même
      après le début de la Contagion et votre détermination a provoqué en vous
      une subtile transformation. Sinon, ce changement peut s’être produit en
      protégeant un groupe de réfugiés soi-disant infectés d’une «équipe de
      confinement» de Kanawa.</p>

      <h2>Citation</h2>

      <p class="MsoNormal">« Que ce soient des jiangshis, des criminels ou des
      envahisseurs d’une autre réalité, une balle peut toujours faire la
      différence. »</p>

      <h2>Description</h2>

      <p class="MsoNormal">On peut se moquer de votre veste en cuir mais c’est
      un vêtement qui ne se démode pas. De plus, elle dissimule vos deux
      holsters d’épaule. Votre badge est utile à Hong Kong dans votre
      juridiction mais il peut aussi vous aider dans d’autres régions du
      Pan-Pacifica tant que les gens ne l’examinent pas de trop près. Vous êtes
      véhément et vous ne supportez pas qu’on manque de respect à vous ou à
      votre badge.</p>

      <h2>Objectif</h2>

      <p class="MsoNormal">La Kanawa Corporation cache quelque chose, un lien
      avec</p>

      <p class="MsoNormal">les autres Pillards de Réalités ou avec la Contagion.
      Quoi</p>

      <p class="MsoNormal">qu’il se passe, cela pourrait ébranler tout le
      Pan-Pacifica.</p>

      <p class="MsoNormal">Bonne ou mauvaise, votre boulot est de découvrir la
      vérité.</p>

      <h2>Noms</h2>

      <p class="MsoNormal">Bao, Curry, Dee, Eagle, Jin, Li, Ling, Shooter,
      Whiskey, Zhang</p>

      <h2>Piste de progression (optionnelle)</h2>

      <p class="MsoNormal">□ (5 PX) Double tir</p>

      <p class="MsoNormal">□ (7 PX) Frappe Ki</p>

      <p class="MsoNormal">□ (1 PX) Persuasion +1</p>

      <p class="MsoNormal">□ (2 PX) Réalité +2</p>

      <p class="MsoNormal">□ (3 PX) Esquive +3</p>

      <p class="MsoNormal">□ (3 PX) Combat à mains nues +3</p>

      <p class="MsoNormal">□ (4 PX) Armes à feu +4</p>

      <p class="MsoNormal">□ (5 PX) Armes à feu +5</p>
